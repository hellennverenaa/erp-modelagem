# docker-compose.yml — ERP Chão de Fábrica (Backend) v4.0
# Arquivo gerado para a Fase 1 (Fundação) - Engenharia DevOps
# Este arquivo configura os serviços do ERP (Backend Node.js, Postgres e Redis)
# e gerencia a comunicação com a rede externa legada dass_private.

version: '3.8'

services:
  # ═════════════════════════════════════════════════════════════════
  # SERVIÇO: erp-backend (Node.js/Express)
  # ═════════════════════════════════════════════════════════════════
  erp-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: erp-backend
    restart: unless-stopped
    ports:
      - "${ERP_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      ERP_PORT: 3001
      
      # Conexão com o PostgreSQL dedicado
      DB_HOST: ${DB_HOST:-erp-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-erp_modelagem}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS}
      
      # Conexão com o Redis (Cache e Rate Limiting)
      REDIS_HOST: ${REDIS_HOST:-erp-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASS: ${REDIS_PASS}
      
      # JWT (Chave secreta compartilhada com dass_auth_service para SSO)
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-3600}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      
      # Integração Legada (Comunicação entre containers)
      DASS_AUTH_URL: http://main-service:2399
      SOBRACORTE_API_URL: ${SOBRACORTE_API_URL:-http://host.docker.internal:3333}
      
      # CORS e Outros Ajustes
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      UPLOAD_DIR: /app/uploads
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB:-10}
      
      # Integrações de E-mail (Genkit flows)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      
      # IA (Genkit / Gemini)
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY}
    
    volumes:
      - erp_uploads:/app/uploads
    
    # Redes: conecta à rede externa para se comunicar com dass_auth_service
    # e à rede interna para acessar o Postgres e o Redis de forma segura.
    networks:
      - dass_private
      - erp_internal
      
    # Permite resolver o host.docker.internal para acessar serviços na máquina host (ex: sobracorte)
    extra_hosts:
      - "host.docker.internal:host-gateway"
      
    depends_on:
      erp-postgres:
        condition: service_healthy
      erp-redis:
        condition: service_healthy
        
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
          
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ═════════════════════════════════════════════════════════════════
  # SERVIÇO: erp-postgres (Banco de Dados PostgreSQL Dedicado)
  # ═════════════════════════════════════════════════════════════════
  erp-postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-erp_modelagem}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      # Mapeia a porta 5432 interna para 5433 externa no host para evitar conflitos
      - "${DB_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - erp_pgdata:/var/lib/postgresql/data
    networks:
      - erp_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-erp_modelagem}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ═════════════════════════════════════════════════════════════════
  # SERVIÇO: erp-redis (Cache e Rate Limiting)
  # ═════════════════════════════════════════════════════════════════
  erp-redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-erp_redis_secret} --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      # Mapeia a porta 6379 interna para 6380 externa para evitar conflitos
      - "${REDIS_EXTERNAL_PORT:-6380}:6379"
    volumes:
      - erp_redisdata:/data
    networks:
      - erp_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-erp_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

# ═════════════════════════════════════════════════════════════════
# VOLUMES PERSISTENTES
# ═════════════════════════════════════════════════════════════════
volumes:
  erp_pgdata:
    driver: local
  erp_redisdata:
    driver: local
  erp_uploads:
    driver: local

# ═════════════════════════════════════════════════════════════════
# REDES
# ═════════════════════════════════════════════════════════════════
networks:
  # Rede externa pré-existente onde roda o container dass_auth_service (main-service)
  dass_private:
    external: true

  # Rede interna privada para isolamento do Postgres e Redis
  erp_internal:
    driver: bridge
    internal: true
